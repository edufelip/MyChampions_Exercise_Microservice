name: Deploy Exercise Service (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: exerciseservice-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: ghcr.io/edufelip/mychampions_exercise_microservice

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.IMAGE_REPO }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build_and_push
    environment: production
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Setup known hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync project to VPS
        shell: bash
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          ssh "$VPS_USER@$VPS_HOST" "mkdir -p /opt/exercise-microservice"
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            ./ "$VPS_USER@$VPS_HOST:/opt/exercise-microservice/"

      - name: Replace VPS .env from GitHub Secret
        shell: bash
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          EXERCISESERVICE_ENV_FILE: ${{ secrets.EXERCISESERVICE_ENV_FILE }}
        run: |
          set -euo pipefail
          if [[ -z "${EXERCISESERVICE_ENV_FILE:-}" ]]; then
            echo "ERROR: EXERCISESERVICE_ENV_FILE secret is empty"
            exit 1
          fi
          printf '%s' "$EXERCISESERVICE_ENV_FILE" | ssh "$VPS_USER@$VPS_HOST" '
            set -euo pipefail
            mkdir -p /opt/exercise-microservice
            cd /opt/exercise-microservice
            umask 077
            cat > .env.new
            for k in YMOVE_API_KEY GOOGLE_TRANSLATE_API_KEY REDIS_URL; do
              grep -Eq "^${k}=.+" .env.new || { echo "ERROR: missing or empty ${k} in EXERCISESERVICE_ENV_FILE"; rm -f .env.new; exit 1; }
            done
            mv .env.new .env
          '

      - name: Deploy image on VPS with Docker Compose
        timeout-minutes: 12
        shell: bash
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          ssh "$VPS_USER@$VPS_HOST" "
            set -euo pipefail; \
            echo \"$GHCR_TOKEN\" | docker login ghcr.io -u \"$GHCR_USERNAME\" --password-stdin; \
            cd /opt/exercise-microservice; \
            pm2 delete exercise-microservice >/dev/null 2>&1 || true; \
            IMAGE_REPO='${{ env.IMAGE_REPO }}' IMAGE_TAG='${IMAGE_TAG}' docker-compose pull api; \
            IMAGE_REPO='${{ env.IMAGE_REPO }}' IMAGE_TAG='${IMAGE_TAG}' docker-compose up -d; \
            docker image prune -f >/dev/null 2>&1 || true; \
            docker ps --format '{{.Names}}\t{{.Status}}\t{{.Image}}' \
          "

      - name: Verify public health
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS --retry 10 --retry-delay 2 https://exerciseservice.eduwaldo.com/health

      - name: Failure diagnostics
        if: failure()
        shell: bash
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          ssh "$VPS_USER@$VPS_HOST" '
            set -euo pipefail
            echo "== docker ps =="
            docker ps -a --format "{{.Names}}\t{{.Status}}\t{{.Image}}"
            echo
            echo "== compose services =="
            cd /opt/exercise-microservice && docker-compose ps || true
            echo
            echo "== api logs =="
            docker logs --tail=150 exercise-microservice 2>&1 || true
            echo
            echo "== redis logs =="
            docker logs --tail=80 exercise-microservice-redis 2>&1 || true
          '
